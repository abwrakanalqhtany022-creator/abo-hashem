<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مقوات أبو هاشم - جودة تبيض الوجه</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-green: #1b5e20; --light-green: #2ecc71; --bg-gray: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; }
        
        /* الهيدر */
        .hero { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('image_11.png'); 
                height: 350px; background-size: cover; background-position: center; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        
        /* قسم معرض الصور (مثل نظام مكتب إنجاز) */
        .container { padding: 20px; max-width: 1000px; margin: auto; }
        .section-title { color: var(--primary-green); border-right: 6px solid var(--primary-green); padding-right: 15px; margin: 30px 0 20px; font-size: 24px; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        
        /* بطاقة النوع (مثل خانة المهن) */
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; text-align: center; border-bottom: 4px solid var(--primary-green); }
        .card .img-container { width: 100%; height: 250px; background-color: white; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .card h3 { margin: 15px 0 5px; color: var(--primary-green); }
        .price-tag { background: #f1f8e9; color: var(--primary-green); font-weight: bold; padding: 10px; display: block; border-top: 1px solid #e0e0e0; }

        /* أزرار التواصل */
        .contact-box { background: var(--primary-green); color: white; border-radius: 20px; padding: 30px; text-align: center; margin-top: 40px; }
        .btn { display: inline-block; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; margin: 10px; font-size: 18px; transition: 0.3s; cursor: pointer; border: none; }
        .btn-whatsapp { background-color: #25d366; color: white; }
        .btn-call { background-color: white; color: var(--primary-green); }

        /* الزر العائم */
        .floating-wa { position: fixed; bottom: 20px; left: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; }
    </style>
</head>
<body>

    <div class="hero">
        <h1 style="font-size: 35px; margin-bottom: 10px;">مقوات أبو هاشم 🌿</h1>
        <p>قطفة اليوم.. طازج ومنظف وجاهز للكيف</p>
    </div>

    <div class="container">
        <h2 class="section-title">معرض الأنواع (صور حقيقية)</h2>
        
        <div class="grid-container">
            <div class="card">
                <div class="img-container">
                    <img src="image_9.png" alt="قات روس - أبو هاشم">
                </div>
                <h3>قات روس (لوكس)</h3>
                <div class="price-tag">السعر: حسب قطفة اليوم</div>
            </div>

            <div class="card">
                <div class="img-container">
                    <img src="image_11.png" alt="قات ماوية - أبو هاشم">
                </div>
                <h3>قات ماوية (درجة أولى)</h3>
                <div class="price-tag">السعر: خيارات متنوعة</div>
            </div>
        </div>

        <div class="contact-box">
            <h2>هل لديك طلبية خاصة؟</h2>
            <p>لا تشيل هم.. تواصل معنا ونوصله لك لمكانك</p>
            <a href="https://wa.me/967717741860?text=أهلاً%20أبو%20هاشم،%20أشتي%20أطلب%20قات" class="btn btn-whatsapp">
                <i class="fab fa-whatsapp"></i> طلب عبر واتساب
            </a>
            <a href="tel:967717741860" class="btn btn-call">
                <i class="fas fa-phone-alt"></i> إتصال مباشر
            </a>
        </div>
    </div>

    <a href="https://wa.me/967717741860" class="floating-wa">
        <i class="fab fa-whatsapp"></i>
    </a>

</body>
</html>
